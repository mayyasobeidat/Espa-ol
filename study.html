<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كلمات بحاجة لدراسة - مياس</title>
    <style>
        :root {
            --primary: #3498db; --bg: #f4f7f6; --card-bg: #ffffff;
            --text: #2c3e50; --danger: #e74c3c; --success: #2ecc71;
        }
        body.dark {
            --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; padding: 20px; transition: 0.3s;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 600px; margin: 0 auto 20px;
        }
        .stats-badge {
            background: var(--primary); color: white; padding: 5px 15px;
            border-radius: 20px; font-weight: bold;
        }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; max-width: 800px; margin: 0 auto;
        }
        .word-card {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer; position: relative; transition: transform 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .word-card:active { transform: scale(0.95); }
        .sp-word { font-size: 20px; font-weight: bold; color: var(--primary); display: block; }
        .ar-word { 
            margin-top: 10px; display: none; font-size: 16px; color: var(--success); 
            border-top: 1px dashed #ddd; padding-top: 10px;
        }
        .word-card.show .ar-word { display: block; }
        
        .delete-btn {
            position: absolute; top: 5px; left: 5px; background: none;
            border: none; color: var(--danger); font-size: 18px; cursor: pointer;
            opacity: 0.3; transition: 0.3s;
        }
        .word-card:hover .delete-btn { opacity: 1; }
        
        .empty-msg { text-align: center; margin-top: 50px; opacity: 0.7; }
        .back-btn {
            display: block; width: fit-content; margin: 20px auto;
            text-decoration: none; color: var(--primary); font-weight: bold;
        }
    </style>
</head>
<body class="">
    <div class="header">
        <h2>📚 قائمة المراجعة</h2>
        <div class="stats-badge" id="countBadge">0 كلمة</div>
    </div>

    <div id="wordsGrid" class="grid">
        </div>

    <div id="emptyMsg" class="empty-msg" style="display: none;">
        🎉 مذهل! لا يوجد كلمات في قائمة الصعوبات حالياً.
    </div>

    <a href="index.html" class="back-btn">⬅️ العودة للرئيسية</a>

    <script>
        // تحميل الثيم
        if (localStorage.getItem('theme_list') === 'dark') {
            document.body.classList.add('dark');
        }

       async function loadStudyWords() {
    const grid = document.getElementById('wordsGrid');
    const badge = document.getElementById('countBadge');
    
    // 1. جلب الكلمات من الذاكرة المحلية (الموبايل)
    let localStudyList = JSON.parse(localStorage.getItem('needs_study')) || [];
    
    grid.innerHTML = "<p style='text-align:center;'>جاري مزامنة الكلمات من السحابة... ☁️</p>";

    try {
        // 2. جلب الكلمات من جوجل شيت (السحابة)
        const response = await fetch(`${API_URL}?action=getStudyWords&user=${currentUser}`);
        const cloudWords = await response.json();
        
        // 3. دمج القائمتين ومنع التكرار
        // نستخدم Map عشان نتأكد إن الكلمة ما تتكرر لو كانت موجودة هون وهون
        const combinedMap = new Map();
        [...cloudWords, ...localStudyList].forEach(word => {
            combinedMap.set(word.sp.toLowerCase(), word);
        });
        
        const finalMainList = Array.from(combinedMap.values());
        
        // تحديث الذاكرة المحلية عشان المرة الجاية تفتح أسرع
        localStorage.setItem('needs_study', JSON.stringify(finalMainList));

        // 4. العرض في الصفحة
        displayWords(finalMainList);

    } catch (e) {
        console.error("Sync failed, showing local only");
        displayWords(localStudyList);
    }
}

function displayWords(list) {
    const grid = document.getElementById('wordsGrid');
    const badge = document.getElementById('countBadge');
    const emptyMsg = document.getElementById('emptyMsg');

    badge.innerText = `${list.length} كلمة`;

    if (list.length === 0) {
        grid.innerHTML = "";
        emptyMsg.style.display = "block";
        return;
    }

    emptyMsg.style.display = "none";
    grid.innerHTML = list.map(word => `
        <div class="word-card" onclick="this.classList.toggle('show')">
            <button class="delete-btn" onclick="event.stopPropagation(); removeItem('${word.sp}')">×</button>
            <span class="sp-word">${word.sp}</span>
            <span class="ar-word">${word.ar}</span>
        </div>
    `).join('');
}

        window.onload = loadStudyWords;
    </script>
</body>
</html>
